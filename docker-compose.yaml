services:
  # PHP Engine
  backend:
    build: ./safe-step-backend
    container_name: simulation_backend
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=safe_step_db
      - DB_USERNAME=admin
      - DB_PASSWORD=password
    networks:
      - safe_step_network

  # Nginx to serve the PHP Backend
  nginx:
    build:
      context: ./safe-step-backend
      dockerfile: nginx.Dockerfile
    ports:
      - "8000:80"
    depends_on:
      - backend
    networks:
      - safe_step_network

  # Next.js App
  frontend:
    build: ./safe-step-frontend
    container_name: safe_step_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    networks:
      - safe_step_network

  # Database
  db:
    image: postgres:15-alpine
    container_name: safe_step_db
    environment:
      - POSTGRES_DB=safe_step_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    networks:
      - safe_step_network

networks:
  safe_step_network:
    driver: bridge